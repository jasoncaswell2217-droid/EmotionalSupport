name: Build and Deploy to Namecheap via SSH
on:
  push:
    branches:
      - main # Change to 'master' if your primary branch is master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Deploy Production Files via SSH
        uses: appleboy/scp-action@master
        with:
          host: yourdomain.com # <-- REPLACE with your actual domain or shared server IP
          username: buyertju
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 21098 # Namecheap's default shared hosting SSH port
          source: "dist/*"
          target: "public_html/psychelense/"
          strip_components: 1
