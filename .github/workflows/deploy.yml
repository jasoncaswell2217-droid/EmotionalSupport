name: Build and Deploy to Namecheap
on:
  push:
    branches:
      - main # Change to 'master' if your primary branch is master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Sync Production Build over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.buyerspotted.com # <-- Replace with your main site URL
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./psychelense/
          dangerous-clean-slate: false
