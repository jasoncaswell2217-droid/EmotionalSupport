name: Build and Deploy to Namecheap
on:
  push:
    branches:
      - main # If your branch is called 'master', change 'main' to 'master'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-node: '20' # Uses a stable Node version to compile Vite

      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # If your build requires the API key

      - name: Deploy Production Files via SSH
        uses: appleboy/scp-action@master
        with:
          host: yourdomain.com # Replace with your real domain
          username: buyertju
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./dist/*"
          target: "./public_html/psychelense/"
          strip_components: 1

          dangerous-clean-slate: false # Prevents it from wiping your main website files
